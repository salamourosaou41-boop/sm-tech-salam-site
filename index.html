<form action="https://formspree.io/f/votrecode" method="POST">
  <label>Nom complet:<br><input type="text" name="name" required></label><br>
  <label>Email:<br><input type="email" name="_replyto" required></label><br>
  <label>Téléphone:<br><input type="tel" name="phone"></label><br>
  <label>Date souhaitée:<br><input type="date" name="date" required></label><br>
  <label>Message:<br><textarea name="message"></textarea></label><br>
  <button type="submit">Envoyer</button>
</form>



<section id="contact" style="padding:40px; max-width:600px; margin:auto;">
  <h2>Prendre rendez-vous</h2>
  <form action="https://formspree.io/f/votrecode" method="POST">
    <label for="name">Nom complet :</label><br />
    <input type="text" id="name" name="name" required style="width:100%; padding:8px; margin-bottom:12px;" /><br />

    <label for="email">Email :</label><br />
    <input type="email" id="email" name="_replyto" required style="width:100%; padding:8px; margin-bottom:12px;" /><br />

    <label for="phone">Téléphone :</label><br />
    <input type="tel" id="phone" name="phone" style="width:100%; padding:8px; margin-bottom:12px;" /><br />

    <label for="date">Date souhaitée :</label><br />
    <input type="date" id="date" name="date" required style="width:100%; padding:8px; margin-bottom:12px;" /><br />

    <label for="message">Message :</label><br />
    <textarea id="message" name="message" rows="4" style="width:100%; padding:8px; margin-bottom:12px;"></textarea><br />

    <button type="submit" style="padding:12px 24px; background:#2c7ed8; color:#fff; border:none; border-radius:8px; cursor:pointer;">
      Envoyer
    </button>
  </form>
</section>
